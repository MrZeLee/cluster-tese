apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: json-server-hpa-amd64
  namespace: json-server
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: json-server-amd64
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 50

